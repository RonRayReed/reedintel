name: Build and Deploy Backend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build container image via ACR
        run: |
          az acr build \
            --registry reedintelacr \
            --image reedintel-backend:${{ github.sha }} \
            --image reedintel-backend:latest \
            ./backend

      - name: Deploy Backend Container App (create or update)
        run: |
          ACR_PASS=$(az acr credential show \
            --name reedintelacr \
            --resource-group reedintel-prod-rg \
            --query "passwords[0].value" -o tsv)

          PG_FQDN=$(az postgres flexible-server show \
            --name reedintel-pg-prod \
            --resource-group reedintel-prod-rg \
            --query fullyQualifiedDomainName -o tsv)

          APP_EXISTS=$(az containerapp show \
            --name reedintel-backend \
            --resource-group reedintel-prod-rg \
            --query name -o tsv 2>/dev/null || echo "")

          if [ -z "$APP_EXISTS" ]; then
            echo "Creating backend Container App for the first time..."

            az containerapp create \
              --name reedintel-backend \
              --resource-group reedintel-prod-rg \
              --environment reedintel-prod-cae \
              --image "reedintelacr.azurecr.io/reedintel-backend:${{ github.sha }}" \
              --registry-server reedintelacr.azurecr.io \
              --registry-username reedintelacr \
              --registry-password "$ACR_PASS" \
              --cpu 0.5 --memory 1.0Gi \
              --min-replicas 1 --max-replicas 2 \
              --ingress internal --target-port 8000 --allow-insecure \
              --env-vars \
                "DATABASE_HOST=$PG_FQDN" \
                DATABASE_NAME=reedintel \
                DATABASE_USER=reedadmin \
                DATABASE_SSLMODE=require \
                "DATABASE_PASSWORD=${{ secrets.POSTGRES_ADMIN_PASSWORD }}"
          else
            echo "Waiting for container app to reach a stable state..."
            for i in $(seq 1 15); do
              STATE=$(az containerapp show \
                --name reedintel-backend \
                --resource-group reedintel-prod-rg \
                --query "properties.provisioningState" -o tsv 2>/dev/null || echo "Unknown")
              echo "  provisioningState: $STATE"
              if [ "$STATE" = "Succeeded" ] || [ "$STATE" = "Failed" ]; then
                break
              fi
              echo "  Not ready yet — waiting 20s (attempt $i/15)..."
              sleep 20
            done

            echo "Updating existing backend Container App..."

            for i in 1 2 3 4 5; do
              az containerapp registry set \
                --name reedintel-backend \
                --resource-group reedintel-prod-rg \
                --server reedintelacr.azurecr.io \
                --username reedintelacr \
                --password "$ACR_PASS" && break || {
                echo "registry set attempt $i failed, retrying in 30s..."
                sleep 30
              }
            done

            for i in 1 2 3 4 5; do
              az containerapp update \
                --name reedintel-backend \
                --resource-group reedintel-prod-rg \
                --image "reedintelacr.azurecr.io/reedintel-backend:${{ github.sha }}" && break || {
                echo "update attempt $i failed, retrying in 30s..."
                sleep 30
              }
            done
          fi

      - name: Print backend internal URL
        run: |
          ENV_DOMAIN=$(az containerapp env show \
            --name reedintel-prod-cae \
            --resource-group reedintel-prod-rg \
            --query "properties.defaultDomain" -o tsv)
          echo "Backend internal URL: https://reedintel-backend.internal.$ENV_DOMAIN"
