name: Build and Deploy Dashboard

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "frontend/**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build container image via ACR
        run: |
          az acr build \
            --registry reedintelacr \
            --image reedintel-dashboard:${{ github.sha }} \
            --image reedintel-dashboard:latest \
            ./frontend

      - name: Deploy Container App (create or update)
        run: |
          ACR_PASS=$(az acr credential show \
            --name reedintelacr \
            --resource-group reedintel-prod-rg \
            --query "passwords[0].value" -o tsv)

          ENV_DOMAIN=$(az containerapp env show \
            --name reedintel-prod-cae \
            --resource-group reedintel-prod-rg \
            --query "properties.defaultDomain" -o tsv)

          BACKEND_URL="https://reedintel-backend.internal.$ENV_DOMAIN"

          APP_EXISTS=$(az containerapp show \
            --name reedintel-dashboard \
            --resource-group reedintel-prod-rg \
            --query name -o tsv 2>/dev/null || echo "")

          if [ -z "$APP_EXISTS" ]; then
            echo "Creating Container App for the first time..."

            az containerapp create \
              --name reedintel-dashboard \
              --resource-group reedintel-prod-rg \
              --environment reedintel-prod-cae \
              --image "reedintelacr.azurecr.io/reedintel-dashboard:${{ github.sha }}" \
              --registry-server reedintelacr.azurecr.io \
              --registry-username reedintelacr \
              --registry-password "$ACR_PASS" \
              --cpu 0.5 --memory 1.0Gi \
              --min-replicas 1 --max-replicas 1 \
              --ingress external --target-port 80 \
              --env-vars \
                "BACKEND_URL=$BACKEND_URL"
          else
            echo "Waiting for container app to reach a stable state..."
            for i in $(seq 1 15); do
              STATE=$(az containerapp show \
                --name reedintel-dashboard \
                --resource-group reedintel-prod-rg \
                --query "properties.provisioningState" -o tsv 2>/dev/null || echo "Unknown")
              echo "  provisioningState: $STATE"
              if [ "$STATE" = "Succeeded" ] || [ "$STATE" = "Failed" ]; then
                break
              fi
              echo "  Not ready yet — waiting 20s (attempt $i/15)..."
              sleep 20
            done

            echo "Updating existing Container App..."

            for i in 1 2 3 4 5; do
              az containerapp registry set \
                --name reedintel-dashboard \
                --resource-group reedintel-prod-rg \
                --server reedintelacr.azurecr.io \
                --username reedintelacr \
                --password "$ACR_PASS" && break || {
                echo "registry set attempt $i failed, retrying in 30s..."
                sleep 30
              }
            done

            for i in 1 2 3 4 5; do
              az containerapp update \
                --name reedintel-dashboard \
                --resource-group reedintel-prod-rg \
                --image "reedintelacr.azurecr.io/reedintel-dashboard:${{ github.sha }}" \
                --set-env-vars "BACKEND_URL=$BACKEND_URL" && break || {
                echo "update attempt $i failed, retrying in 30s..."
                sleep 30
              }
            done
          fi

      - name: Print dashboard URL
        run: |
          URL=$(az containerapp show \
            --name reedintel-dashboard \
            --resource-group reedintel-prod-rg \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "=================================="
          echo "  Dashboard live at:"
          echo "  https://$URL"
          echo "=================================="
