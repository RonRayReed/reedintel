name: Build and Deploy Worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "worker/**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build container image via ACR
        run: |
          az acr build \
            --registry reedintelacr \
            --image reedintel-worker:${{ github.sha }} \
            --image reedintel-worker:latest \
            ./worker

      - name: Deploy image to Container App
        run: |
          ACR_PASS=$(az acr credential show --name reedintelacr --query "passwords[0].value" -o tsv)
          az containerapp update \
            --name reedintel-worker \
            --resource-group reedintel-prod-rg \
            --image reedintelacr.azurecr.io/reedintel-worker:${{ github.sha }} \
            --registry-server reedintelacr.azurecr.io \
            --registry-username reedintelacr \
            --registry-password "$ACR_PASS"
