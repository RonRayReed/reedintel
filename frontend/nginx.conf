server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Azure DNS — required for runtime hostname resolution inside ACA
    resolver 168.63.129.16 valid=30s ipv6=off;

    location /api/ {
        set $backend http://reedintel-backend.internal.salmonwater-76954c6b.northeurope.azurecontainerapps.io;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host reedintel-backend.internal.salmonwater-76954c6b.northeurope.azurecontainerapps.io;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
