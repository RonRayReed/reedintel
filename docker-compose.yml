services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: reedintel
      POSTGRES_USER: reedadmin
      POSTGRES_PASSWORD: reedlocal2024
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reedadmin -d reedintel"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: reedintel
      DATABASE_USER: reedadmin
      DATABASE_PASSWORD: reedlocal2024
      DATABASE_SSLMODE: disable
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
