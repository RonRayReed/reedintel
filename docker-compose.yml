services:

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_NAME: ${DATABASE_NAME:-reedintel}
      DATABASE_USER: ${DATABASE_USER:-reedadmin}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_SSLMODE: ${DATABASE_SSLMODE:-require}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  worker:
    build: ./worker
    restart: unless-stopped
    environment:
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_NAME: ${DATABASE_NAME:-reedintel}
      DATABASE_USER: ${DATABASE_USER:-reedadmin}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_SSLMODE: ${DATABASE_SSLMODE:-require}
      RUN_MODE: continuous

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
